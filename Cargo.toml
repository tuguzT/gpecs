[workspace]
resolver = "3"
members = ["crates/*"]

[workspace.package]
version = "0.0.0"
authors = ["tuguzT <timurka.tugushev@gmail.com>"]
license = "MIT OR Apache-2.0"
edition = "2021"
rust-version = "1.84.0"

[workspace.dependencies]
gpecs_soa = { path = "crates/gpecs_soa" }
gpecs_sparse = { path = "crates/gpecs_sparse" }
gpecs_soa_erased = { path = "crates/gpecs_soa_erased" }
indexmap = { version = "2.8" }
petgraph = { version = "0.7" }
rspirv = { git = "https://github.com/gfx-rs/rspirv", rev = "267882d4" }
criterion = { version = "0.5", features = ["html_reports"] }

[workspace]
resolver = "3"
members = [
    # Main crates
    "crates/gpecs",
    "crates/gpecs_types",
    # Utility crates
    "crates/gpecs_soa",
    "crates/gpecs_soa_erased",
    "crates/gpecs_sparse",
    "crates/gpecs_spirv_analysis",
    "crates/gpecs_task_graph",
    # Standalone benchmarks
    "benches/gpecs_soa_bench",
    "benches/gpecs_ecs_benchmark",
    "benches/gpecs_ecs_benchmark_types",
    "benches/gpecs_ecs_benchmark_shader",
    # Standalone examples
    "examples/gpecs_simple",
    "examples/gpecs_simple_types",
    "examples/gpecs_simple_shader",
]

[workspace.package]
version = "0.0.0"
authors = ["tuguzT <timurka.tugushev@gmail.com>"]
license = "MIT OR Apache-2.0"
edition = "2024"
rust-version = "1.88.0"

[workspace.dependencies]
gpecs = { path = "crates/gpecs" }
gpecs_soa = { path = "crates/gpecs_soa", default-features = false }
gpecs_sparse = { path = "crates/gpecs_sparse", default-features = false }
gpecs_soa_erased = { path = "crates/gpecs_soa_erased" }
gpecs_types = { path = "crates/gpecs_types" }
gpecs_simple_types = { path = "examples/gpecs_simple_types" }
gpecs_ecs_benchmark_types = { path = "benches/gpecs_ecs_benchmark_types" }
cargo-gpu = { git = "https://github.com/Rust-GPU/cargo-gpu", rev = "a2ad3574dd32142ff661994e0d79448a45d18f47" }
spirv-std = { git = "https://github.com/Rust-GPU/rust-gpu", rev = "87ea628070561f576aeef84c92a0e3e3c25d63ff" }
indexmap = { version = "2.10" }
petgraph = { version = "0.8" }
itertools = { version = "0.14", default-features = false }
rspirv = { version = "0.12" }
criterion = { version = "0.7", features = ["html_reports"] }
pollster = { version = "0.4" }
bytemuck = { version = "1.23" }
const_format = { version = "0.2" }
env_logger = { version = "0.11" }
log = { version = "0.4" }
glam = { version = "0.30" }
wgpu = { version = "26" }
renderdoc = { version = "0.12" }

[workspace.lints.rust]
# TODO make it "warn" after implementation & tests
missing_docs = "allow"
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(target_arch, values("spirv"))',
] }

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
# TODO make it "warn" after implementation & tests
missing_safety_doc = "allow"

[profile.release]
debug = true
codegen-units = 1
lto = "fat"

[profile.bench]
debug = true

[package]
name = "gpecs_ecs_benchmark_shader"
description = "SPIR-V shader for `ecs_benchmark` of (probably) ECS on GPU"
version.workspace = true
license.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false

[lib]
crate-type = ["dylib", "lib"]

[dependencies]
gpecs_types = { workspace = true }
gpecs_ecs_benchmark = { workspace = true }
spirv-std = { workspace = true }
unroll = { workspace = true }
static_assertions = { workspace = true }

[features]
nightly = []

[lints]
workspace = true

[package.metadata.rust-gpu.install]
spirv_builder_source = "https://github.com/Rust-GPU/rust-gpu"
spirv_builder_version = "1e4e468"
rust_toolchain = "nightly-2024-11-22"
auto-install-rust-toolchain = false
force-spirv-cli-rebuild = false
force-overwrite-lockfiles-v4-to-v3 = false

[package.metadata.rust-gpu.build]
no_default_features = true
features = ["nightly"]
shader-target = "spirv-unknown-spv1.5"
spirv-metadata = "Full"

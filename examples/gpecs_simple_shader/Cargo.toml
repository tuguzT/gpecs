[package]
name = "gpecs_simple_shader"
description = "SPIR-V shader for simple example of (probably) ECS on GPU"
version.workspace = true
license.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false

[lib]
crate-type = ["dylib", "lib"]

[dependencies]
gpecs_types = { workspace = true }
gpecs_simple_types = { workspace = true }
spirv-std = { workspace = true }
unroll = { workspace = true }
static_assertions = { workspace = true }

[features]
nightly = []

[lints]
workspace = true

[package.metadata.rust-gpu.install]
spirv_builder_source = "https://github.com/Rust-GPU/rust-gpu"
spirv_builder_version = "6d7c1cd"
auto-install-rust-toolchain = false
rebuild-codegen = false
force-overwrite-lockfiles-v4-to-v3 = false

[package.metadata.rust-gpu.build]
default_features = true
features = ["nightly"]
target = "spirv-unknown-spv1.5"
spirv-metadata = "Full"

[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.0.0"
authors = ["tuguzT <timurka.tugushev@gmail.com>"]
license = "MIT OR Apache-2.0"
edition = "2021"

[workspace.dependencies]
gpecs_spirv_analysis = { path = "../crates/gpecs_spirv_analysis" }

rspirv = { version = "0.12" }
spirv-std = { version = "0.9.0" }
spirv-builder = { version = "0.9.0", default-features = false }
unroll = { version = "0.1.5" }
static_assertions = { version = "1.1.0" }
